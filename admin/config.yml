backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Articles"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on homepage cards (2-3 sentences)" }
      - label: "Categories"
        name: "categories"
        widget: "select"
        multiple: true
        min: 1
        options:
          - { label: "ITOM", value: "itom" }
          - { label: "CSDM", value: "csdm" }
          - { label: "AI", value: "ai" }
          - { label: "Enterprise Architecture", value: "ea" }
          - { label: "IT4IT", value: "it4it" }
          - { label: "ITSM", value: "itsm" }
          - { label: "Platform", value: "platform" }
          - { label: "SecOps", value: "secops" }
          - { label: "HRSD", value: "hrsd" }
          - { label: "Tech Trends", value: "trends" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "5 min read", hint: "e.g. 3 min read, 6 min read" }
      - { label: "Tags", name: "tags", widget: "list", hint: "Add tags one by one (e.g. ServiceNow, ITOM, Cloud)" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false, hint: "Show as featured article on homepage" }
      - label: "Body"
        name: "body"
        widget: "markdown"
