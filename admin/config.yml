backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Articles"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on homepage cards" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "ITOM", value: "itom" }
          - { label: "CSDM", value: "csdm" }
          - { label: "AI", value: "ai" }
          - { label: "Enterprise Architecture", value: "ea" }
          - { label: "IT4IT", value: "it4it" }
          - { label: "ITSM", value: "itsm" }
          - { label: "Platform", value: "platform" }
          - { label: "SecOps", value: "secops" }
          - { label: "HRSD", value: "hrsd" }
          - { label: "Tech Trends", value: "trends" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "5 min read" }
      - { label: "Tags", name: "tags", widget: "list", hint: "Comma separated tags" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
